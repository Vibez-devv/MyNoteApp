<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Note App</title>
  <link rel="shortcut icon" href="./image/note.jpeg" type="image/x-icon">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<style>
  button {
    border: none;
    padding: 10px 130px;
    margin-left: 76px;
    margin-bottom: 8px;
    border-radius: 12px;
    background: #0f172a;
    color: white;
    border: 1px solid #1fa2ff;
    /* padding: 12px 24px; */
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.4s ease;
    font-weight: 600;
  }

  button:hover {
    background: #1fa2ff;
    border-color: #00d4c7;
    box-shadow: 0 0 15px rgba(31, 162, 255, 0.6);
    transform: translateY(-2px);
  }

  .paper {
    width: auto;
    /* border: 2px solid red; */
    margin-left: 200px;
    margin-top: 100px;
  }

  input {
    border: none;
    padding: 10px 120px;
    margin-bottom: 10px;
    margin-left: 50px;
    border-radius: 12px;

  }

  textarea {
    border: none;
    margin-bottom: 10px;
    padding: 20px 128px;
    margin-left: 50px;
    border-radius: 12px;
  }

  body {
    margin: 0;
    /* min-height: 100vh; */
    font-family: sans-serif;
    color: white;

    background: linear-gradient(180deg,
        #020617 0%,
        #020b2e 25%,
        #021b4d 50%,
        #03396c 75%,
        #005b96 100%);

    overflow-x: hidden;
  }

  h3 {
    /* color: white; */
    margin-left: 50px;
  }


  /* Tablet */
  @media screen and (max-width: 768px) {
    .paper {
      margin-left: 50px;
      margin-top: 50px;
    }

    input {
      padding: 10px 60px;
      margin-left: 20px;
    }

    textarea {
      padding: 20px 68px;
      margin-left: 20px;
    }

    button {
      padding: 10px 70px;
      margin-left: 20px;
    }

    h3 {
      margin-left: 20px;
    }
  }

  /* Mobile */
  @media screen and (max-width: 576px) {
    .paper {
      margin-left: 10px;
      margin-top: 30px;
    }

    input {
      padding: 10px 30px;
      margin-left: 10px;
      width: 90%;
    }

    textarea {
      padding: 20px 30px;
      margin-left: 10px;
      width: 90%;
    }

    button {
      padding: 10px 30px;
      margin-left: 10px;
      width: 90%;
    }

    h3 {
      margin-left: 10px;
      font-size: 22px;
    }
  }

  /* Small Phones */
  @media screen and (max-width: 375px) {
    .paper {
      margin-left: 5px;
    }

    input,
    textarea,
    button {
      width: 95%;
      margin-left: 5px;
    }

    h3 {
      margin-left: 5px;
      font-size: 20px;
    }
  }
</style>

<body>


  <div class="paper ">
    <h3>My Note App :</h3>
    <br>
    <input type="text" id="search" placeholder="Search Notes............">
    <br>

    <input type="text" id="title" placeholder="Note Title............">
    <br>
    <textarea id="content" placeholder="Text here.............."></textarea>
    <br>
    <button id="addBtn">Add Note</button>
  </div>


  <!-- <div class="ocean"></div> -->

  <div id="notes"></div>
</body>
<script type="module">
  // Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
  // import { getfirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
  import {
    getFirestore,
    collection,
    addDoc,
    getDocs,
    deleteDoc,
    doc
  } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";
  // import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
  import {
    getAuth,
    signInAnonymously
  } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
  // TODO: Add SDKs for Firebase products that you want to use
  // https://firebase.google.com/docs/web/setup#available-libraries

  // Your web app's Firebase configuration
  const firebaseConfig = {
    apiKey: "AIzaSyBeV-hcfPaghDY-RfjR_0ZspHwnwBUnV2M",
    authDomain: "vibez-devv.firebaseapp.com",
    projectId: "vibez-devv",
    storageBucket: "vibez-devv.firebasestorage.app",
    messagingSenderId: "727468453012",
    appId: "1:727468453012:web:a3dcb81d9f935e94df1881"
  };


  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app)
  const auth = getAuth();

  let userId = null;
  let notes = [];


  signInAnonymously(auth).then(user => {
    userId = user.user.uid;
    loadNotes();
  })

  window.addNote = async function () {
    const title = document.getElementById('title').value
    const content = document.getElementById('content').value

    if (!title) return alert('Title required');

    const note = {
      title,
      content,
      createdAt: new Date().toLocaleDateString(),
      updatedAt: new Date().toLocaleDateString(),
      userId
    };

    notes.push(note);
    saveLocal();
    renderNotes();

    await addDoc(collection(db, "notes"), note)
  };

  async function loadNotes() {
    const snapshot = await getDocs(collection(db, "notes"));
    notes = [];


    snapshot.forEach(docSnap => {
      const data = docSnap.data();
      if (data.userId === userId) {
        notes.push({ ...data, id: docSnap.id })
      }
    });

    saveLocal();
    renderNotes();
  }


  function saveLocal() {
    localStorage.setItem("notes", JSON.stringify(notes))
  }

  document.getElementById('search'), addEventListener("input", (e) => {
    renderNotes(e.target.value);
  });

  document.getElementById("addBtn").addEventListener("click", addNote)

  function renderNotes(search = "") {
    const container = document.getElementById('notes');
    container.innerHTML = "";

    notes
      .filter(n =>
        n.title.toLowerCase().includes(search.toLocaleLowerCase()) ||
        n.content.toLowerCase().includes(search.toLowerCase())
      )

      .forEach((note, index) => {
        const wordCount = note.content.split(" ").length;
        const charCount = note.content.length;

        const div = document.createElement("div")

        div.innerHTML = `
        <h3>${note.title}</h3>
        <p>${note.content}</p>

        <small>
          created: ${note.createdAt}<br>
          updated: ${note.updatedAt}<br>
          words: ${wordCount}, charaters: ${charCount}
          </small><br>
        
          <button onclick="editNote(${index})">Edit</button>
          <button onclick="deleteNote(${index})">Delete</button>
          <button onclick="exportNote(${index})">Export</button>
          
        
        `;

        container.appendChild(div)
      });

  }


  window.editNote = function (index) {
    const newContent = prompt("Edit note;", notes[index].content);

    if (newContent !== null) {
      notes[index].content = newContent;
      notes[index].updatedAt = new Date().toLocaleDateString();


      saveLocal();
      renderNotes();
    }
  };

  // window.deleteNote = async function(index){
  //   if (!confirm("Delete this note")) return
  // }


  window.deleteNote = async function (index) {
    if (!confirm("Delete this note?")) return;

    const note = notes[index];

    if (note.id) {
      await deleteDoc(doc(db, "notes", note.id));
    }

    notes.splice(index, 1);
    saveLocal();
    renderNotes();






    // window.exportNote = function(index){
    //   const note = notes[index];




    // }

  }


  window.exportNote = function (index) {
    const note = notes[index];

    const blob = new Blob(
      [note.title + "\n\n" + note.content],
      { type: "text/plain" }
    );

    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = note.title + ".txt";
    a.click();
  };


  // window.addEventListener("offline", () => {
  //   alert("You are offline");
  // });

  // window.addEventListener("online", () => {
  //   alert("Back online, syncing...");
  //   loadNotes();
  // })
  window.addEventListener("offline", () => {
    document.body.insertAdjacentHTML("afterbegin",
      '<div id="offlineMsg" style="background:red;color:white;padding:10px;text-align:center;">You are offline</div>'
    );
  });

  window.addEventListener("online", () => {
    const msg = document.getElementById("offlineMsg");
    if (msg) msg.remove();

    console.log("Back online");
    loadNotes();
  });

</script>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"

</html>
