<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Note App</title>
  <link rel="shortcut icon" href="./image/note.jpeg" type="image/x-icon">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"

</head>
<style>

    cursor: pointer;
    transition: all 0.4s ease;

  button:hover {
    background: #1fa2ff;

    transform: translateY(-2px);

  .paper {
    width: auto;
    /* border: 2px solid red; */
    margin-left: 200px;
    margin-top: 100px;
  }

  input {
    border: none;

  textarea {

  body {
    /* background: linear-gradient(135deg, #0F172A, #1E293B); */
    /* background: linear-gradient(135deg, #020617, #0F172A); */

    /* color: white; */

<body>


  <div class="paper ">
    <h3>My Note App :</h3>
    <br>
    <input type="text" id="search" placeholder="Search Notes............">
    <br>

    <input type="text" id="title" placeholder="Note Title............">
    <br>
    <textarea id="content" placeholder=""></textarea>
    <br>
    <button onclick="addNote()">Add Note</button>
  </div>

  <div id="notes"></div>
</body>
<script type="module">
  // Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
  // import { getfirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
  import {
    getFirestore,
    collection,
    addDoc,
    getDocs,
    deleteDoc,
    doc
  } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";
  // import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
  import {
  getAuth,
  signInAnonymously
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
  // TODO: Add SDKs for Firebase products that you want to use
  // https://firebase.google.com/docs/web/setup#available-libraries

  // Your web app's Firebase configuration
  const firebaseConfig = {
    apiKey: "AIzaSyBeV-hcfPaghDY-RfjR_0ZspHwnwBUnV2M",
    authDomain: "vibez-devv.firebaseapp.com",
    projectId: "vibez-devv",
    storageBucket: "vibez-devv.firebasestorage.app",
    messagingSenderId: "727468453012",
    appId: "1:727468453012:web:a3dcb81d9f935e94df1881"
  };


  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app)
  const auth = getAuth();

  let userId = null;
  let notes = [];


  signInAnonymously(auth).then(user => {
    userId = user.user.uid;
    loadNotes();
  })

  window.addNote = async function () {
    const title = document.getElementById('title').value
    const content = document.getElementById('content').value

    if (!title) return alert('Title required');

    const note = {
      title,
      content,
      createdAt: new Date().toLocaleDateString(),
      updatedAt: new Date().toLocaleDateString(),
      userId
    };

    notes.push(note);
    saveLocal();
    renderNotes();

    await addDoc(collection(db, "notes"),)
  };

  async function loadNotes() {
    const snapshot = await getDocs(collection(db, "notes"));
    notes = [];


    snapshot.forEach(docSnap => {
      const data = docSnap.data();
      if (data.userId === userId) {
        notes.push({ ...data, id: docSnap.id })
      }
    });

    saveLocal();
    renderNotes();
  }


  function saveLocal() {
    localStorage.setItem("notes", JSON.stringify(notes))
  }

  document.getElementById('serach'), addEventListener("input", (e) => {
    renderNotes(e.target.value);
  });

  document.getElementById("addNote").addEventListener("click", addNote)

  function renderNotes(search = "") {
    const container = document.getElementById('notes');
    container.innerHTML = "";

    notes
      .filter(n =>
        n.title.toLowerCase().includes(search.toLocaleLowerCase()) ||
        n.content.toLowerCase().includes(search.toLowerCase())
      )

      .forEach((note, index) => {
        const wordCount = note.content.split(" ").length;
        const charCount = note.content.length;

        const div = document.getElementById('div');

        div.innerHTML = `
        <h3>${note.title}</h3>
        <p>${note.content}</p>

        <small>
          created: ${note.createdAt}<br>
          updated: ${note.updatedAt}<br>
          words: ${wordCount}, charaters: ${charCount}
          </small><br>
        
          <button onclick="editNote(${index})">Edit</button>
          <button onclick="deleteNote(${index})">Deleted</button>
          <button onclick="exportNote(${index})">Export</button>
          
        
        `;

        container.appendChild(div)
      });

  }


  window.editNote = function (index) {
    const newContent = prompt("Edit note;", notes[index].content);

    if (newContent !== null) {
      notes[index].content = newContent;
      notes[index].updatedAt = new Date().toLocaleDateString();


      saveLocal();
      renderNotes();
    }
  };

  // window.deleteNote = async function(index){
  //   if (!confirm("Delete this note")) return
  // }


  window.deleteNote = async function (index) {
    if (!confirm("Delete this note?")) return;

    const note = notes[index];

    if (note.id) {
      await deleteDoc(doc(db, "notes", note.id));
    }

    notes.splice(index, 1);
    saveLocal();
    renderNotes();




    window.exportNote = function (index) {
      const note = notes[index];

      const blob = new Blob(
        [note.title + "\n\n" + note.content],
        { type: "text/plain" }
      );

      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = note.title + ".txt";
      a.click();
    };


    window.addEventListener("offline", () => {
      alert("You are offline");
    });

    window.addEventListener("online", () => {
      alert("Back online, syncing...");
      loadNotes();
    })


    // window.exportNote = function(index){
    //   const note = notes[index];


    //   const blob = new blob(
    //     [note.title + "\n\n" + note.content],
    //     {type: "text/plain"}
    //   );




    // }

  }

</script>
